# Time zone for all tariff-window / scheduling math (defaults to Asia/Tokyo).
time_zone = "Asia/Tokyo"

# observe = true: run the optimizer, publish the dashboard + HA decision/
# time-remaining entities + recommendation notifications, but DO NOT actuate the
# inverter. Retained for back-compat; `mode` (below) is the primary control.
observe = false

# mode selects the actuator behaviour (the Phase-1 blip-safe grid-charge control):
#   "observe"  — compute + log only, no inverter writes (the safe default)
#   "watchdog" — only the fail-safe path may write; never initiates charging
#   "live"     — full grid-charge control
# Empty/unset resolves to "observe"; live actuation is only ever reached by an
# explicit mode = "live". Leave this at observe until the supervised rollout.
mode = "observe"

[service]
poll_interval = "5m"
planning_horizon = "96h"       # total horizon; the grid telescopes past near_horizon
near_horizon = "72h"           # fine (slot_duration) grid extent; beyond it, far_slot_duration is used (0 = uniform grid)
slot_duration = "30m"
far_slot_duration = "60m"      # coarse slot width beyond near_horizon (must divide 60m; off-peak windows must be hour-aligned)
web_port = 8080

[influxdb]
url = "http://localhost:8181"
token = "your-influxdb-token"
database = "energy"

# HA default InfluxDB uses unit_of_measurement as table name.
# Adjust these if your sensors use different units (e.g., "kW" instead of "W").
[influxdb.measurements]
power = "W"
temperature = "°C"
percentage = "%"

[homeassistant]
url = "ws://homeassistant.local:8123/api/websocket"
token = "your-ha-long-lived-access-token"

[homeassistant.entities]
battery_soc = "sensor.battery_soc"
pv_power = "sensor.pv_power"
grid_power = "sensor.grid_power"
load_power = "sensor.load_power"

[solcast]
api_key = "your-solcast-api-key"
poll_times = ["06:00", "12:00"]

# One or more rooftop sites; per-site forecasts are summed.
[[solcast.sites]]
name = "house"
id = "your-site-id"
tilt = 30                      # panel tilt degrees; drives the Open-Meteo tilted-irradiance far-horizon model
azimuth = 180                  # compass degrees (180 = due south)

[weather]
latitude = -33.87
longitude = 151.21

[battery]
capacity_kwh = 9.6        # size to your battery bank
max_charge_kw = 5.0
max_discharge_kw = 5.0
soc_min = 0.20
soc_max = 1.0
efficiency = 0.95          # round-trip

[rates]
currency = "AUD"
peak_rate = 0.35
off_peak_rate = 0.12
feed_in_rate = 0.05

[[rates.off_peak_windows]]
start = "01:00"
end = "05:00"

[[rates.off_peak_windows]]
start = "11:00"
end = "13:00"

[optimizer]
soc_risk_weight = 2.0
confidence_threshold = 0.3  # below this, use conservative defaults
min_charge_kw = 1.0         # a grid-charge permit must yield >= this (no empty-bypass)
blip_cost = 5.0             # currency penalty per bypass entry (skips marginal windows)

# [pv_model]
# max_pv_kw = 25            # physical ceiling (kW) on the learned far-horizon PV model; 0/unset = unbounded.
#                           # Set it to a generous multiple of your inverter AC cap so a stuck or
#                           # unit-relabelled PV sensor can't inflate the learned reference (and
#                           # high-fault days are dropped from calibration). Optional, backward-compatible.

[mqtt]
broker = "tcp://localhost:1883"
topic_prefix = "homeassistant"
device_id = "srne_system"                 # actuation target: your inverter's MQTT controller device
# decision_device_id = "energy_optimiser" # this app's own HA-discovery device for the plan + time-remaining (default: energy_optimiser)
# username = ""                           # MQTT broker auth (blank = anonymous); supports env:VARNAME
# password = ""

# Phase-1 blip-safe grid-charge actuator. The only working grid-charge path on
# this ASP/SRNE inverter is output_priority→UTI (utility bypass = one power blip)
# then mains_charge_current > 0; rate changes are amps-only (no blip); exit is
# output_priority→SBU (one blip). All fields have sensible SRNE-add-on defaults.
[actuator]
# output_priority_select = "select.srne_solar_system_output_priority"
# mains_charge_current_number = "number.srne_solar_system_mains_charge_current"
# battery_voltage_sensor = "sensor.srne_solar_system_battery_voltage"
# utility_option = "UTI"          # exact select option for utility bypass (verified at runtime)
# battery_option = "SBU"          # exact select option for battery-priority
# num_units = 2                   # parallel inverter units the per-unit current applies to
# max_charge_current_a = 100      # per-unit current clamp (A)
# state_dir = "/data"             # persists the per-window blip budget across restart (default: pv_model.data_dir)
# watchdog_interval = "30s"       # cadence of the never-stuck-in-bypass safety check
# write_timeout = "10s"           # per inverter write + ack
# voltage_stale = "5m"            # battery-voltage reading older than this → nominal-voltage fallback
# state_stale = "5m"              # output-priority reading older than this → watchdog fail-safe

[alertmanager]
# url = "http://alertmanager:9093"        # POST decision/risk alerts to an Alertmanager (blank = disabled); it routes to Discord/etc.
# site = "home"                            # routing label attached to every alert (default "home")

[alerts]
risk_soc_threshold = 0.15                  # projected SoC (0-1) at/below this within 24h -> warn (default 0.15)
expensive_day_yen = 300                    # projected peak-rate import cost above this -> warn (default 300)

# CT-monitored circuits for load modeling.
# Category: fixed (always-on), routine (time-dependent), weather (temp-dependent), deferrable (optimizer-controlled)

[[circuit]]
name = "kitchen"
entity_id = "sensor.ct_kitchen_power"
category = "routine"

[[circuit]]
name = "lighting"
entity_id = "sensor.ct_lighting_power"
category = "fixed"

[[circuit]]
name = "ac"
entity_id = "sensor.ct_ac_power"
category = "weather"

